    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#09121f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#eaf2fb" media="(prefers-color-scheme: light)" />
    <script>
      // Resolve the initial theme before first paint to avoid a flash:
      // an explicit saved choice wins, otherwise follow the OS preference.
      (function () {
        const saved = localStorage.getItem('theme');
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        const theme = saved ?? (prefersLight ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
